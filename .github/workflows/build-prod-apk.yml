name: Build MoshidonQX (Prod 正式签名版)

on:
  workflow_dispatch:
    inputs:
      custom_application_id:
        description: '自定义包名/Package Name (留空则优先读取 GitHub Secrets/Variables 配置，若仍无则取项目配置文件)'
        required: false
        default: ''
      custom_app_name:
        description: '自定义应用名/App Name (留空则优先读取 GitHub Secrets/Variables 配置，若仍无则取项目配置文件)'
        required: false
        default: ''
      max_images_limit:
        description: '最大图片上传限制/Max Images Limit (留空则优先读取 GitHub Secrets/Variables 配置，若仍无则取项目配置文件)'
        required: false
        default: ''
      version_code:
        description: '版本号/Version Code (整型数值，留空则自动递增为 GitHub 构建号)'
        required: false
        default: ''
      version_name:
        description: '版本名称/Version Name (例如 1.0.0，留空则默认为 1.0.构建号)'
        required: false
        default: ''

env:
  KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
  KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
  CUSTOM_APPLICATION_ID: ${{ github.event.inputs.custom_application_id || secrets.CUSTOM_APPLICATION_ID || vars.CUSTOM_APPLICATION_ID || '' }}
  CUSTOM_APP_NAME: ${{ github.event.inputs.custom_app_name || secrets.CUSTOM_APP_NAME || vars.CUSTOM_APP_NAME || '' }}
  MAX_IMAGES_LIMIT: ${{ github.event.inputs.max_images_limit || secrets.MAX_IMAGES_LIMIT || vars.MAX_IMAGES_LIMIT || '' }}


jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Resolve Custom Configurations
        run: |
          # 1. Resolve Application ID
          RESOLVED_APP_ID="${{ env.CUSTOM_APPLICATION_ID }}"
          if [ -z "$RESOLVED_APP_ID" ]; then
            if [ -f "config.properties" ]; then
              RESOLVED_APP_ID=$(grep "^custom_application_id=" config.properties | cut -d'=' -f2 | tr -d '\r\n ')
            fi
          fi
          if [ -z "$RESOLVED_APP_ID" ]; then
            RESOLVED_APP_ID="org.joinmastodon.android.qx"
          fi
          
          # 2. Resolve Application Name
          RESOLVED_APP_NAME="${{ env.CUSTOM_APP_NAME }}"
          if [ -z "$RESOLVED_APP_NAME" ]; then
            if [ -f "config.properties" ]; then
              RESOLVED_APP_NAME=$(grep "^custom_app_name=" config.properties | cut -d'=' -f2 | tr -d '\r\n ')
            fi
          fi
          if [ -z "$RESOLVED_APP_NAME" ]; then
            RESOLVED_APP_NAME="Moshidon"
          fi
          
          echo "RESOLVED_APP_ID=$RESOLVED_APP_ID" >> $GITHUB_ENV
          echo "RESOLVED_APP_NAME=$RESOLVED_APP_NAME" >> $GITHUB_ENV
          echo "Resolved App ID: $RESOLVED_APP_ID"
          echo "Resolved App Name: $RESOLVED_APP_NAME"
          
          # 3. Resolve Version Code
          RESOLVED_VERSION_CODE="${{ github.event.inputs.version_code || secrets.VERSION_CODE || vars.VERSION_CODE || '' }}"
          if [ -z "$RESOLVED_VERSION_CODE" ]; then
            if [ -f "config.properties" ]; then
              RESOLVED_VERSION_CODE=$(grep "^version_code=" config.properties | cut -d'=' -f2 | tr -d '\r\n ')
            fi
          fi
          if [ -z "$RESOLVED_VERSION_CODE" ]; then
            RESOLVED_VERSION_CODE="${{ github.run_number }}"
          fi
          
          # 4. Resolve Version Name
          RESOLVED_VERSION_NAME="${{ github.event.inputs.version_name || secrets.VERSION_NAME || vars.VERSION_NAME || '' }}"
          if [ -z "$RESOLVED_VERSION_NAME" ]; then
            if [ -f "config.properties" ]; then
              RESOLVED_VERSION_NAME=$(grep "^version_name=" config.properties | cut -d'=' -f2 | tr -d '\r\n ')
            fi
          fi
          if [ -z "$RESOLVED_VERSION_NAME" ]; then
            RESOLVED_VERSION_NAME="1.0.${{ github.run_number }}"
          fi
          
          echo "VERSION_CODE=$RESOLVED_VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$RESOLVED_VERSION_NAME" >> $GITHUB_ENV
          echo "Resolved Version Code: $RESOLVED_VERSION_CODE"
          echo "Resolved Version Name: $RESOLVED_VERSION_NAME"

          
          # 3. Sanitize and Resolve Keystore Secret (Option 1 Safe Decryption)
          CLEANED_KS=""
          if [ -n "$KEYSTORE_FILE" ]; then
            # Remove PEM-style dashed headers, newlines, and spaces
            CLEANED_KS=$(echo -n "$KEYSTORE_FILE" | sed '/START/d' | sed '/END/d' | sed '/---/d' | tr -d '\r\n ')
          fi
          
          if [ -n "$CLEANED_KS" ]; then
            echo "CLEANED_KEYSTORE_FILE=$CLEANED_KS" >> $GITHUB_ENV
            echo "USE_SECRET_KEYSTORE=true" >> $GITHUB_ENV
            echo "Secret-based Keystore detected and sanitized successfully."
          else
            echo "USE_SECRET_KEYSTORE=false" >> $GITHUB_ENV
            echo "No secret-based Keystore configured. Using auto-keystore."
          fi

      - name: Restore Private Keystore Cache
        if: ${{ env.USE_SECRET_KEYSTORE == 'false' }}
        uses: actions/cache/restore@v4
        id: restore-keystore
        with:
          path: .github/secrets
          key: ${{ runner.os }}-keystore-${{ env.RESOLVED_APP_ID }}

      - name: Setup Keystore & Signing Config
        run: |
          KEYSTORE_DIR=".github/secrets"
          KEYSTORE_PATH="$KEYSTORE_DIR/release.jks"
          PASSWORD_PATH="$KEYSTORE_DIR/keystore-password.txt"
          SIGNING_KS_PATH="release.jks"
          
          if [ "${{ env.USE_SECRET_KEYSTORE }}" = "true" ]; then
            echo "Use secret-based Keystore."
          else
            echo "Use auto-generated private Keystore (Zero-Config mode)."
            
            mkdir -p "$KEYSTORE_DIR"
            
            if [ -f "$KEYSTORE_PATH" ] && [ -f "$PASSWORD_PATH" ]; then
              echo "Private Keystore successfully restored from secure GitHub Actions cache."
              KS_PASS=$(cat "$PASSWORD_PATH" | tr -d '\r\n ')
            else
              echo "No cached keystore found. Generating a new private keystore..."
              KS_PASS="${{ env.RESOLVED_APP_ID }}"
              echo "Using application package name as password."
              
              # Generate keystore using keytool
              keytool -genkeypair -v -keystore "$KEYSTORE_PATH" \
                -alias custom-alias \
                -keyalg RSA -keysize 2048 -validity 10000 \
                -storepass "$KS_PASS" -keypass "$KS_PASS" \
                -dname "CN=Developer, OU=Mobile, O=CustomApp, L=None, ST=None, C=UN"
                
              # Save password
              echo -n "$KS_PASS" > "$PASSWORD_PATH"
              echo "New private Keystore successfully generated!"
            fi
            
            # Copy to temp location for apksigner
            cp "$KEYSTORE_PATH" "$SIGNING_KS_PATH"
            echo "SIGNING_KEYSTORE_PATH=$SIGNING_KS_PATH" >> $GITHUB_ENV
            echo "SIGNING_PASSWORD=$KS_PASS" >> $GITHUB_ENV
          fi

      - name: Save Private Keystore Cache
        if: ${{ env.USE_SECRET_KEYSTORE == 'false' && steps.restore-keystore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: .github/secrets
          key: ${{ runner.os }}-keystore-${{ env.RESOLVED_APP_ID }}

      - name: Decode Secret Keystore
        if: ${{ env.USE_SECRET_KEYSTORE == 'true' }}
        uses: timheuer/base64-to-file@v1
        id: android_keystore
        with:
          fileName: "release.jks"
          encodedString: ${{ env.CLEANED_KEYSTORE_FILE }}

      - name: Prepare Signing Environment Variables
        run: |
          if [ "${{ env.USE_SECRET_KEYSTORE }}" = "true" ]; then
            echo "SIGNING_KEYSTORE_PATH=${{ steps.android_keystore.outputs.filePath }}" >> $GITHUB_ENV
            echo "SIGNING_PASSWORD=${{ env.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew :mastodon:assembleRelease --no-daemon

      - name: Locate and Sign APK
        run: |
          UNSIGNED_APK=$(find . -path "*/build/outputs/apk/*" -name "*.apk" | grep -i "release" | grep -v "\-Signed.apk" | head -n 1)
          if [ -z "$UNSIGNED_APK" ]; then
            echo "ERROR: Could not locate compiled release APK!"
            exit 1
          fi
          
          # 直接使用中文应用名作为 APK 文件名
          SIGNED_APK="${{ env.RESOLVED_APP_NAME }}-v${{ env.VERSION_NAME }}-Prod-Signed.apk"
          
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks "${{ env.SIGNING_KEYSTORE_PATH }}" \
            --ks-pass "pass:${{ env.SIGNING_PASSWORD }}" \
            --ks-key-alias custom-alias \
            --out "$SIGNED_APK" "$UNSIGNED_APK"
            
          echo "SIGNED_APK_PATH=$SIGNED_APK" >> $GITHUB_ENV

      - name: Create GitHub Release
        run: |
          # gh CLI 和 softprops/action-gh-release 都会在构建上传 URL 时丢弃非 ASCII 字符
          # 解决方案：gh CLI 仅创建 Release（不含附件），再用 curl + Python3 URL 编码上传 APK
          # Python3 urllib.parse.quote 将中文转为合法 %xx 编码，GitHub API 解码后原样保存文件名

          TAG="v${VERSION_NAME}-prod"
          APK_BASENAME=$(basename "$SIGNED_APK_PATH")

          # 构建 Release 描述（使用 printf 避免 heredoc 缩进问题）
          NOTES=$(printf '## MoshidonQX 正式版发布 (Production)\n- **应用名**：%s\n- **包名**：%s\n- **版本**：%s-Prod (VersionCode: %s)\n- **修改**：12张图解锁、包名重置、全语言应用名覆盖、超丝滑 ExoPlayer 播放器\n\n> [!TIP]\n> 此版本为生产发布版，内部未激活崩溃日志写入系统以节省用户存储空间，极其稳定纯净！' \
            "$RESOLVED_APP_NAME" "$RESOLVED_APP_ID" "$VERSION_NAME" "$VERSION_CODE")

          # 1. 创建 Release（不含附件）
          gh release create "$TAG" \
            --title "${RESOLVED_APP_NAME} v${VERSION_NAME}-Prod" \
            --notes "$NOTES"

          # 2. 获取 Release ID
          RELEASE_ID=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" --jq '.id')

          # 3. 用 Python3 将文件名 URL 编码（正确处理中文），再用 curl 直接调用 GitHub Upload API 上传 APK
          ENCODED_NAME=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$APK_BASENAME")

          curl -s -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@${SIGNED_APK_PATH}" \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${ENCODED_NAME}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

