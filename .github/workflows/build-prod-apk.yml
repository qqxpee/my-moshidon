name: Build MoshidonQX (Prod 正式签名版)

on:
  workflow_dispatch:
    inputs:
      custom_application_id:
        description: '自定义包名/Package Name (例如: org.joinmastodon.android.qx，留空则默认取项目配置文件)'
        required: false
        default: ''
      custom_app_name:
        description: '自定义应用名/App Name (例如: MoshidonQX，留空则默认取项目配置文件)'
        required: false
        default: ''
      max_images_limit:
        description: '最大图片上传限制/Max Images Limit (例如: 12，留空则默认取项目配置文件)'
        required: false
        default: ''

env:
  KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
  KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
  CUSTOM_APPLICATION_ID: ${{ github.event.inputs.custom_application_id || vars.CUSTOM_APPLICATION_ID || '' }}
  CUSTOM_APP_NAME: ${{ github.event.inputs.custom_app_name || vars.CUSTOM_APP_NAME || '' }}
  MAX_IMAGES_LIMIT: ${{ github.event.inputs.max_images_limit || vars.MAX_IMAGES_LIMIT || '' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Verify Signing Secrets
        run: |
          if [ -z "${{ env.KEYSTORE_FILE }}" ]; then
            echo "ERROR: KEYSTORE_FILE secret is missing! Please configure KEYSTORE_FILE in repository secrets."
            exit 1
          fi

      - name: Decode Keystore
        uses: timheuer/base64-to-file@v1
        id: android_keystore
        with:
          fileName: "release.jks"
          encodedString: ${{ env.KEYSTORE_FILE }}

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew :mastodon:assembleRelease --no-daemon

      - name: Locate and Sign APK
        run: |
          UNSIGNED_APK=$(find . -path "*/build/outputs/apk/*" -name "*.apk" | grep -i "release" | grep -v "\-Signed.apk" | head -n 1)
          if [ -z "$UNSIGNED_APK" ]; then
            echo "ERROR: Could not locate compiled release APK!"
            exit 1
          fi
          
          FINAL_APP_NAME="${{ env.CUSTOM_APP_NAME }}"
          if [ -z "$FINAL_APP_NAME" ]; then
            FINAL_APP_NAME="Moshidon"
          fi
          
          SIGNED_APK="${FINAL_APP_NAME}-v2.3.0-Prod-Signed.apk"
          
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks ${{ steps.android_keystore.outputs.filePath }} \
            --ks-pass pass:${{ env.KEYSTORE_PASSWORD }} \
            --ks-key-alias custom-alias \
            --out "$SIGNED_APK" "$UNSIGNED_APK"
            
          echo "SIGNED_APK_PATH=$SIGNED_APK" >> $GITHUB_ENV
          echo "FINAL_APP_NAME=$FINAL_APP_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}-prod
          name: "${{ env.FINAL_APP_NAME }} v2.3.0-Prod.${{ github.run_number }}"
          body: |
            ## MoshidonQX 正式版发布 (Production)
            - **应用名**：${{ env.FINAL_APP_NAME }}
            - **包名**：${{ env.CUSTOM_APPLICATION_ID }}
            - **版本**：2.3.0-Prod.${{ github.run_number }}
            - **修改**：12张图解锁、包名重置、全语言应用名覆盖、超丝滑 ExoPlayer 播放器
            
            > [!TIP]
            > 此版本为生产发布版，内部未激活崩溃日志写入系统以节省用户存储空间，极其稳定纯净！
          files: |
            ${{ env.SIGNED_APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
