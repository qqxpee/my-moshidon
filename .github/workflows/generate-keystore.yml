name: Generate Custom Keystore (Sensitive Info Stripped)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate Keystore
        env:
          PASS: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          # 使用完全通用的标识信息，不再包含个人 PII
          keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 10000 \
            -alias custom-alias \
            -storepass "$PASS" -keypass "$PASS" \
            -dname "CN=Developer, OU=Mobile, O=CustomApp, L=None, ST=None, C=UN"
            
          echo "------------------ START OF BASE64 ------------------"
          base64 release.jks 
          echo "------------------ END OF BASE64 ------------------"

      - name: Upload Keystore Artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-keystore-file
          path: release.jks
