name: Generate Custom Keystore (小白证书生成器)

on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: '请设置您的证书密码 (建议6位以上字母或数字，留空则自动随机生成)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Keystore and Base64
        run: |
          # 1. 确定密码：如果有输入就用输入的，没有就随机生成一个
          USER_PASS="${{ github.event.inputs.keystore_password }}"
          if [ -z "$USER_PASS" ]; then
            USER_PASS=$(openssl rand -hex 6)
          fi
          
          echo "=================================================="
          echo "🔑 您的证书密码 (KEYSTORE_PASSWORD) 是: $USER_PASS"
          echo "=================================================="
          
          # 2. 生成证书文件
          keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 10000 \
            -alias custom-alias \
            -storepass "$USER_PASS" -keypass "$USER_PASS" \
            -dname "CN=Developer, OU=Mobile, O=CustomApp, L=None, ST=None, C=UN"
            
          # 3. 打印 Base64 字符串
          echo "=================================================="
          echo "📦 您的证书文本 (KEYSTORE_FILE) 如下 (请完整复制下方两行横线之间的所有行乱码文本):"
          echo "------------------ START OF BASE64 ------------------"
          base64 release.jks
          echo "------------------ END OF BASE64 ------------------"
          echo "=================================================="

      - name: Upload Keystore Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-release-keystore
          path: release.jks
