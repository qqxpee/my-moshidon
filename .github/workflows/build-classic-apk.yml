name: Build and Release MoshidonQX (Chinese Support)

on:
  workflow_dispatch:

env:
  # 这里的包名必须保持英文，不要动！
  NEW_APP_ID: "org.joinmastodon.android.qx"
  KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
  KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Debug (Dev) APK
        run: |
          chmod +x gradlew
          ./gradlew :mastodon:assembleDebug --no-daemon

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoshidonQX-Debug-Dev-APK
          path: mastodon/build/outputs/apk/debug/*.apk

      - name: Decode Keystore
        if: ${{ env.KEYSTORE_FILE != '' }}
        uses: timheuer/base64-to-file@v1
        id: android_keystore
        with:
          fileName: "release.jks"
          encodedString: ${{ env.KEYSTORE_FILE }}

      - name: Build Release APK
        if: ${{ env.KEYSTORE_FILE != '' }}
        run: |
          ./gradlew :mastodon:assembleRelease --no-daemon

      - name: Locate and Sign APK
        if: ${{ env.KEYSTORE_FILE != '' }}
        run: |
          UNSIGNED_APK=$(find . -path "*/build/outputs/apk/*" -name "*.apk" | grep -i "release" | grep -v "\-Signed.apk" | head -n 1)
          [ -z "$UNSIGNED_APK" ] && exit 1
          
          SIGNED_APK="Moshidonv2.3.0-QX.${{ github.run_number }}.apk"
          
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks ${{ steps.android_keystore.outputs.filePath }} \
            --ks-pass pass:${{ env.KEYSTORE_PASSWORD }} \
            --ks-key-alias custom-alias \
            --out "$SIGNED_APK" "$UNSIGNED_APK"

      - name: Create GitHub Release
        if: ${{ env.KEYSTORE_FILE != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "${{ secrets.CUSTOM_APP_NAME }} v2.3.0-QX.${{ github.run_number }}"
          body: |
            ## MoshidonQX 定制发布
            - **应用名**：${{ secrets.CUSTOM_APP_NAME }}
            - **版本**：2.3.0-QX.${{ github.run_number }}
            - **修改**：12张图解锁、包名重置、全语言应用名覆盖
          files: |
            Moshidonv2.3.0-QX.${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
