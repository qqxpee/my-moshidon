name: Build and Release MoshidonQX (Chinese Support)

on:
  workflow_dispatch:

env:
  # 这里的包名必须保持英文，不要动！
  NEW_APP_ID: "org.joinmastodon.android.qx"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        uses: timheuer/base64-to-file@v1
        id: android_keystore
        with:
          fileName: "release.jks"
          encodedString: ${{ secrets.KEYSTORE_FILE }}

      - name: MoshidonQX Hard Patch & Debug Logging
        run: |
          TARGET_JAVA="mastodon/src/main/java/org/joinmastodon/android/ui/viewcontrollers/ComposeMediaViewController.java"
          TARGET_GRADLE="mastodon/build.gradle"
          TARGET_XML="mastodon/src/main/res/values/strings_mo.xml"
          TARGET_MANIFEST="mastodon/src/main/AndroidManifest.xml"
          
          # 1. 动态生成版本号与读取中文应用名
          NEW_VERSION="2.3.0-QX.${{ github.run_number }}"
          APP_NAME="${{ secrets.CUSTOM_APP_NAME }}"

          echo "[SYSTEM_CHECK] 1. 破解图片限制 (已由 properties 配置文件原生支持)"

          echo -e "\n[SYSTEM_CHECK] 2. 修改包名与版本号"
          sed -i "s/applicationId \"org.joinmastodon.android.moshinda\"/applicationId \"${{ env.NEW_APP_ID }}\"/g" $TARGET_GRADLE
          sed -i "s/versionName \"[^\"]*\"/versionName \"$NEW_VERSION\"/g" $TARGET_GRADLE

          echo -e "\n[SYSTEM_CHECK] 3. 注入应用名（支持中文）"
          # 替换 strings_mo.xml，UTF-8 环境下 sed 对中文处理非常稳
          sed -i -E "s/(name=\"mo_app_name(_debug|_nightly)?\"[^>]*>)[^<]*/\1$APP_NAME/g" $TARGET_XML
          # 在清单文件中直接注入中文 label
          sed -i "s/android:label=\"@string\/mo_app_name\"/android:label=\"$APP_NAME\"/g" $TARGET_MANIFEST
          
          echo "[DEBUG] 日志自检：确认中文是否被正确写入"
          grep "mo_app_name" $TARGET_XML
          grep "android:label=" $TARGET_MANIFEST

          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Debug (Dev) APK
        run: |
          chmod +x gradlew
          ./gradlew :mastodon:assembleDebug --no-daemon

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoshidonQX-Debug-Dev-APK
          path: mastodon/build/outputs/apk/debug/*.apk

      - name: Decode Keystore
        if: ${{ secrets.KEYSTORE_FILE != '' }}
        uses: timheuer/base64-to-file@v1
        id: android_keystore
        with:
          fileName: "release.jks"
          encodedString: ${{ secrets.KEYSTORE_FILE }}

      - name: Build Release APK
        if: ${{ secrets.KEYSTORE_FILE != '' }}
        run: |
          ./gradlew :mastodon:assembleRelease --no-daemon

      - name: Locate and Sign APK
        if: ${{ secrets.KEYSTORE_FILE != '' }}
        run: |
          UNSIGNED_APK=$(find . -path "*/build/outputs/apk/*" -name "*.apk" | grep -i "release" | grep -v "\-Signed.apk" | head -n 1)
          [ -z "$UNSIGNED_APK" ] && exit 1
          
          SIGNED_APK="Moshidonv2.3.0-QX.${{ github.run_number }}.apk"
          
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks ${{ steps.android_keystore.outputs.filePath }} \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias custom-alias \
            --out "$SIGNED_APK" "$UNSIGNED_APK"

      - name: Create GitHub Release
        if: ${{ secrets.KEYSTORE_FILE != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "${{ secrets.CUSTOM_APP_NAME }} v2.3.0-QX.${{ github.run_number }}"
          body: |
            ## MoshidonQX 定制发布
            - **应用名**：${{ secrets.CUSTOM_APP_NAME }}
            - **版本**：2.3.0-QX.${{ github.run_number }}
            - **修改**：12张图解锁、包名重置、全语言应用名覆盖
          files: |
            Moshidonv2.3.0-QX.${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
